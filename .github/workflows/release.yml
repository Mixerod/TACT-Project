name: Release

# Builds the Windows installer (NSIS + MSI) and publishes it to a GitHub Release.
# Trigger by pushing a version tag:
#     git tag v1.0.0
#     git push origin v1.0.0
# or run it manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # required for tauri-action to create the GitHub Release

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Python dependencies
        working-directory: python-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Python sidecar (PyInstaller)
        working-directory: python-backend
        run: >
          pyinstaller --onefile --name tact-backend
          --distpath ../src-tauri/binaries/
          --hidden-import=uvicorn.logging
          --hidden-import=uvicorn.loops.auto
          --hidden-import=uvicorn.protocols.http.auto
          --hidden-import=uvicorn.protocols.websockets.auto
          --hidden-import=uvicorn.lifespan.on
          main.py

      - name: Rename sidecar to Tauri target-triple convention
        run: Rename-Item -Path "src-tauri/binaries/tact-backend.exe" -NewName "tact-backend-x86_64-pc-windows-msvc.exe"

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TACT Report Automation ${{ github.ref_name }}"
          releaseBody: |
            ## Cài đặt

            Tải một trong các file cài đặt bên dưới rồi nhấn để cài — **không cần** cài Python, Node hay Rust:

            - **`...-setup.exe`** — bộ cài NSIS (khuyên dùng, cài 1 click cho người dùng hiện tại, không cần quyền admin)
            - **`...-x64_en-US.msi`** — bộ cài MSI (phù hợp triển khai qua Group Policy trong doanh nghiệp)

            App tự khởi động backend Python khi mở. Profile được lưu tại `%APPDATA%\TACTAutomation`, không bị xóa khi cài đè bản mới.
          releaseDraft: false
          prerelease: false
